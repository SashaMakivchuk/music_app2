<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    $FLUTTER_BASE_HREF is replaced when you run `flutter build web`
    (see https://docs.flutter.dev/platform-integration/web/initialization).
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Music App">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Music App">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Music App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { height: 100%; margin: 0; background: #121212; }
    body { overscroll-behavior: none; }
  </style>
</head>
<body>
  <script>
    // Define the callback stub BEFORE the Spotify SDK loads.
    // The SDK calls this immediately when it's ready.
    // We store the resolve function so Dart can trigger player init later.
    window._spotifySDKReady = false;
    window._spotifySDKReadyCallbacks = [];
    window.onSpotifyWebPlaybackSDKReady = function() {
      window._spotifySDKReady = true;
      window._spotifySDKReadyCallbacks.forEach(function(cb) { cb(); });
      window._spotifySDKReadyCallbacks = [];
    };
  </script>
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
